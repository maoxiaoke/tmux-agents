<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 484" width="1080" height="484">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500;600&amp;display=swap');
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
  </defs>

  <rect width="1080" height="484" fill="#f5f5f5"/>

  <!-- Header -->
  <text x="40" y="60" fill="#4f5d75" font-size="11" font-weight="500" font-family="'Geist Mono', ui-monospace, Menlo, monospace" letter-spacing="0.18em">TMUX-AGENTS · STATE MACHINE</text>
  <text x="40" y="100" fill="#2d3142" font-size="32" font-family="'Instrument Serif', Georgia, serif" letter-spacing="-0.02em">Agent status lifecycle</text>

  <g transform="translate(40,140)">
    <rect width="1000" height="328" fill="#f5f5f5"/>

    <!-- Transitions first -->
    <!-- start -> idle -->
    <line x1="62" y1="192" x2="84" y2="192" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- idle -> working -->
    <line x1="220" y1="192" x2="336" y2="192" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- working -> blocked (accent) -->
    <line x1="472" y1="192" x2="588" y2="192" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
    <!-- working -> idle (Stop), arc above -->
    <path d="M406,160 Q280,108 158,160" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- blocked -> working (UserPromptSubmit), arc below -->
    <path d="M666,224 Q536,280 410,224" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Transition labels -->
    <rect x="244" y="180" width="72" height="12" rx="2" fill="#f5f5f5"/>
    <text x="280" y="190" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.04em">UserPromptSubmit</text>

    <rect x="500" y="180" width="64" height="12" rx="2" fill="#f5f5f5"/>
    <text x="532" y="190" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.04em">Notification</text>

    <rect x="264" y="100" width="32" height="12" rx="2" fill="#f5f5f5"/>
    <text x="280" y="110" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">Stop</text>

    <rect x="500" y="284" width="72" height="12" rx="2" fill="#f5f5f5"/>
    <text x="536" y="294" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.04em">UserPromptSubmit</text>

    <!-- Start dot -->
    <circle cx="56" cy="192" r="6" fill="#2d3142"/>

    <!-- State: idle -->
    <rect x="88" y="160" width="132" height="64" rx="8" fill="#f5f5f5"/>
    <rect x="88" y="160" width="132" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
    <text x="154" y="192" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">idle</text>
    <text x="154" y="210" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ready</text>

    <!-- State: working -->
    <rect x="340" y="160" width="132" height="64" rx="8" fill="#f5f5f5"/>
    <rect x="340" y="160" width="132" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
    <text x="406" y="192" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">working</text>
    <text x="406" y="210" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">spinner + time</text>

    <!-- State: blocked (focal) -->
    <rect x="592" y="160" width="148" height="64" rx="8" fill="#f5f5f5"/>
    <rect x="592" y="160" width="148" height="64" rx="8" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
    <text x="666" y="192" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">blocked</text>
    <text x="666" y="210" fill="#eb6c36" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">! needs you</text>

    <!-- Editorial asides -->
    <text x="792" y="188" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif">Stop from any</text>
    <text x="792" y="208" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif">state → idle</text>

    <!-- Legend / note strip -->
    <line x1="40" y1="292" x2="960" y2="292" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
    <text x="40" y="308" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">NOTE</text>
    <text x="40" y="326" fill="#4f5d75" font-size="11" font-family="'Geist', system-ui, sans-serif">
      <tspan font-style="italic" font-family="'Instrument Serif', Georgia, serif" font-size="14" fill="#2d3142">active</tspan>
      is not a stored state — it is the focused pane, overlaid on any state as a blue highlight at render time.
    </text>
  </g>
</svg>
