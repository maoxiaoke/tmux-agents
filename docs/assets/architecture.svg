<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 580" width="1080" height="580">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500;600&amp;display=swap');
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
  </defs>

  <rect width="1080" height="580" fill="#f5f5f5"/>

  <!-- Header -->
  <text x="40" y="60" fill="#4f5d75" font-size="11" font-weight="500" font-family="'Geist Mono', ui-monospace, Menlo, monospace" letter-spacing="0.18em">TMUX-AGENTS · DATA FLOW</text>
  <text x="40" y="100" fill="#2d3142" font-size="32" font-family="'Instrument Serif', Georgia, serif" letter-spacing="-0.02em">State comes from reporting, not scraping</text>

  <g transform="translate(40,140)">
    <rect width="1000" height="420" fill="#f5f5f5"/>

    <!-- Arrows first -->
    <line x1="168" y1="212" x2="200" y2="212" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
    <line x1="356" y1="212" x2="392" y2="212" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
    <line x1="528" y1="212" x2="560" y2="212" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="688" y1="212" x2="720" y2="212" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="840" y1="212" x2="872" y2="212" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="936" y1="244" x2="936" y2="300" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
    <!-- Fallback (dashed elbow: pane screen → scan) -->
    <path d="M104,244 L104,288 L624,288 L624,244" fill="none" stroke="rgba(45,49,66,0.45)" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

    <!-- Arrow labels -->
    <rect x="170" y="192" width="28" height="12" rx="2" fill="#f5f5f5"/>
    <text x="184" y="202" fill="#2e5aa8" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">EVENTS</text>
    <rect x="352" y="192" width="44" height="12" rx="2" fill="#f5f5f5"/>
    <text x="374" y="202" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">WRITE</text>
    <rect x="522" y="192" width="44" height="12" rx="2" fill="#f5f5f5"/>
    <text x="544" y="202" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">READ</text>
    <rect x="828" y="192" width="56" height="12" rx="2" fill="#f5f5f5"/>
    <text x="856" y="202" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">#(…)</text>
    <rect x="912" y="266" width="48" height="12" rx="2" fill="#f5f5f5"/>
    <text x="936" y="276" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CLICK</text>
    <rect x="300" y="282" width="128" height="12" rx="2" fill="#f5f5f5"/>
    <text x="364" y="292" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CAPTURE-PANE · FALLBACK</text>

    <!-- Node: Claude Code (external) -->
    <rect x="40" y="180" width="128" height="64" rx="6" fill="#f5f5f5"/>
    <rect x="40" y="180" width="128" height="64" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
    <rect x="48" y="188" width="34" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.22)" stroke-width="0.8"/>
    <text x="65" y="197" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">PANE</text>
    <text x="104" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Claude Code</text>
    <text x="104" y="234" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">$TMUX_PANE</text>

    <!-- Node: Hook adapter (focal) -->
    <rect x="200" y="180" width="156" height="64" rx="6" fill="#f5f5f5"/>
    <rect x="200" y="180" width="156" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
    <rect x="208" y="188" width="34" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
    <text x="225" y="197" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">HOOK</text>
    <text x="278" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Hook adapter</text>
    <text x="278" y="234" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">claude-hook.sh</text>

    <!-- Node: Hook store -->
    <rect x="392" y="180" width="136" height="64" rx="6" fill="#f5f5f5"/>
    <rect x="392" y="180" width="136" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
    <rect x="400" y="188" width="38" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
    <text x="419" y="197" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STORE</text>
    <text x="460" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Hook store</text>
    <text x="460" y="234" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">~/.cache/…/hook</text>

    <!-- Node: Aggregator -->
    <rect x="560" y="180" width="128" height="64" rx="6" fill="#f5f5f5"/>
    <rect x="560" y="180" width="128" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
    <rect x="568" y="188" width="30" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
    <text x="583" y="197" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">AGG</text>
    <text x="624" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Aggregator</text>
    <text x="624" y="234" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">scan.sh</text>

    <!-- Node: Renderer -->
    <rect x="720" y="180" width="120" height="64" rx="6" fill="#f5f5f5"/>
    <rect x="720" y="180" width="120" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
    <rect x="728" y="188" width="34" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
    <text x="745" y="197" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">VIEW</text>
    <text x="780" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Renderer</text>
    <text x="780" y="234" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">bar.sh</text>

    <!-- Node: Status bar -->
    <rect x="872" y="180" width="128" height="64" rx="6" fill="#f5f5f5"/>
    <rect x="872" y="180" width="128" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
    <rect x="880" y="188" width="36" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
    <text x="898" y="197" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">TMUX</text>
    <text x="936" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Status bar</text>
    <text x="936" y="234" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">status-format</text>

    <!-- Node: Jump / picker -->
    <rect x="872" y="300" width="128" height="56" rx="6" fill="#f5f5f5"/>
    <rect x="872" y="300" width="128" height="56" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
    <rect x="880" y="308" width="30" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
    <text x="895" y="317" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ACT</text>
    <text x="936" y="334" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', system-ui, sans-serif" text-anchor="middle">Jump / picker</text>
    <text x="936" y="348" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">jump · pick</text>

    <!-- Legend -->
    <line x1="40" y1="384" x2="960" y2="384" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
    <text x="40" y="400" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

    <rect x="40" y="414" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
    <text x="60" y="422" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Focal (state reporter)</text>

    <rect x="216" y="414" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
    <text x="236" y="422" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Script</text>

    <rect x="320" y="414" width="14" height="10" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
    <text x="340" y="422" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Store</text>

    <rect x="420" y="414" width="14" height="10" rx="2" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
    <text x="440" y="422" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Agent pane</text>

    <line x1="536" y1="420" x2="564" y2="420" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
    <text x="572" y="422" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Report path</text>

    <line x1="676" y1="420" x2="704" y2="420" stroke="rgba(45,49,66,0.45)" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
    <text x="712" y="422" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Scrape fallback</text>
  </g>
</svg>
